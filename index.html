const firebaseConfig = {

// --- UI COMPONENTS ---
const Card = ({ children, title, icon: Icon, className = "", subtitle, alert }) => (

const FormInput = ({ label, name, value, onChange, type = "text", placeholder, icon: Icon, ...props }) => (
  <div className="relative w-full mb-4">
    {label && <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1 ml-1">{label}</label>}

        {Icon && <Icon size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />}
        <input 
            type={type} name={name} placeholder={placeholder} value={value} onChange={onChange} 
            className={`w-full bg-gray-50 border-none rounded-2xl py-4 pr-4 ${Icon ? 'pl-14' : 'pl-5'} text-sm font-bold outline-none focus:ring-2 focus:ring-red-500 transition-all text-slate-800 shadow-sm`}

const SliderField = ({ label, name, value, onChange, max = "10", min = "1", step = "1", unit = "/10" }) => (
  <div className="mb-6 px-1">

    <input type="range" name={name} min={min} max={max} step={step} value={value} onChange={onChange} className="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-[#E31E24]" />

const ChallengeBar = ({ label, percentage }) => (
    <div className="mb-4">
        <div className="flex justify-between text-[9px] font-black uppercase italic mb-1">

            <span className="text-red-600">{percentage}%</span>
        </div>
        <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div className="h-full bg-[#E31E24] transition-all duration-1000 ease-out" style={{ width: `${percentage}%` }}></div>
        </div>
    </div>
);

const WeightChart = ({ data }) => {
  if (!data || data.length < 2) return <div className="text-[10px] text-slate-400 italic text-center py-4 uppercase font-bold">Meer metingen nodig voor de grafiek</div>;
  const chartData = [...data].reverse(); 
  const weights = chartData.map(d => parseFloat(d.weight)).filter(w => !isNaN(w) && w > 0);
  if(weights.length < 2) return <div className="text-[10px] text-slate-400 italic text-center py-4 uppercase font-bold">Gewicht niet consistent ingevuld</div>;
  
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const range = maxW - minW;
  
  const pts = weights.map((w, i) => {
    const x = (i / (weights.length - 1)) * 100;
    const y = 100 - ((w - minW) / range) * 100;
    return `${x},${y}`;
  }).join(' ');

  return (
    <div className="mt-8 mb-4 relative h-24 w-full">
      <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full overflow-visible" preserveAspectRatio="none">
        <polyline 
            fill="none" 
            stroke="#E31E24" 
            strokeWidth="2.5" 
            vectorEffect="non-scaling-stroke" 
            points={pts} 
            strokeLinecap="round" 
            strokeLinejoin="round" 
        />
      </svg>
      {weights.map((w, i) => {
        const x = (i / (weights.length - 1)) * 100;
        const y = 100 - ((w - minW) / range) * 100;
        const isFirst = i === 0;
        const isLast = i === weights.length - 1;
        
        return (
            <div key={i} className="absolute" style={{ left: `${x}%`, top: `${y}%`, transform: 'translate(-50%, -50%)' }}>
                <div className="w-2.5 h-2.5 bg-white border-2 border-[#E31E24] rounded-full"></div>
                {isFirst && (
                    <div className="absolute bottom-full left-0 mb-1.5 text-[9px] font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">
                        Start: {w}
                    </div>
                )}
                {isLast && (
                    <div className="absolute bottom-full right-0 mb-1.5 text-[10px] font-black italic text-[#E31E24] whitespace-nowrap">
                        Nu: {w}kg
                    </div>
                )}
            </div>
        );
      })}
    </div>
  );
};

// --- MAIN APP ---
const App = () => {
  const [view, setView] = useState('login'); 
  const [clientTab, setClientTab] = useState('dashboard');
  const [step, setStep] = useState('form');
  const [submissions, setSubmissions] = useState([]);
  const [clients, setClients] = useState([]);
  
  const [challengeSettings, setChallengeSettings] = useState({
      status: 'Gesloten',
      week: 1,
      protocolUrl: '',
      goldName: 'Nog niet bekend',
      silverName: 'Nog niet bekend',
      bronzeName: 'Nog niet bekend',
      hallOfFame: '',
      winners: [],
      startDate: '', 
      endDate: '',
      prize1: '',
      prize2: '',
      prize3: '',
      pinnedChatText: ''
  });

  const [newWinner, setNewWinner] = useState({
      name: '',
      year: new Date().getFullYear().toString(),
      type: 'New Year Challenge',
      photoBase64: ''
  });
  
  const [isChatOpen, setIsChatOpen] = useState(false);
  const [showShareModal, setShowShareModal] = useState(false);
  const [showSOSModal, setShowSOSModal] = useState(false); 
  const [chatMessages, setChatMessages] = useState([]);
  const [newChatMessage, setNewChatMessage] = useState('');
  const chatEndRef = useRef(null);
  
  const [searchTerm, setSearchTerm] = useState('');
  const [isSubmitting, setIsSubmitting] = useState(false);
  const [showPinModal, setShowPinModal] = useState(false);
  const [showAdminTab, setShowAdminTab] = useState('checkins');
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);
  const [checkedIds, setCheckedIds] = useState(new Set());
  
  const [loginName, setLoginName] = useState(localStorage.getItem('fe_name') || '');
  const [loginCode, setLoginCode] = useState('');
  const [loginError, setLoginError] = useState('');

  const [newClientName, setNewClientName] = useState('');
  const [newClientCode, setNewClientCode] = useState('');

  const [formData, setFormData] = useState({
    clientName: '',
    date: new Date().toISOString().split('T')[0],
    weight: '', sleepHours: 7, motivation: 5, energy: 5, mentalStress: 3,
    illnessSigns: '', musclePain: '', hunger: 3, cravings: '',
    bowelFrequency: 1, bowelQuality: 'Normaal', bloating: '',
    trainingDay: false, trainingDetails: '', steps: '', calories: '',
    trainingDuration: '', trainingRpe: '7',
    supplements: true, biggestWin: '', focusTomorrow: '', waterLiters: 2.5, 
    proteinGrams: '', cyclePhase: 'N.v.t.', photoBase64: '',
    screenTime: '', dailyRating: 7, gratefulFor: '', biggestChallenge: ''
  });

  useEffect(() => {
    signInAnonymously(auth).catch(console.error);
    const unsubSub = onSnapshot(collection(db, 'checkins'), (snapshot) => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      setSubmissions(data);
    });
    const unsubCli = onSnapshot(collection(db, 'clients'), (snapshot) => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      setClients(data);
    });
    const unsubChal = onSnapshot(doc(db, 'settings', 'challenge'), (doc) => {
        if (doc.exists()) setChallengeSettings(doc.data());
    });
    
    // Auto-clean 24 uur in Chat logic
    const qChat = query(collection(db, 'challenge_messages'), orderBy('createdAt', 'desc'), limit(100));
    const unsubChat = onSnapshot(qChat, (snapshot) => {
        const now = Date.now();
        const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        msgs.forEach(async (msg) => {
            if (msg.createdAt && typeof msg.createdAt.toMillis === 'function') {
                if (now - msg.createdAt.toMillis() > 86400000) { 
                    await deleteDoc(doc(db, 'challenge_messages', msg.id));
                }
            }
        });
        
        const validMsgs = msgs.filter(m => {
            if (!m.createdAt || typeof m.createdAt.toMillis !== 'function') return true;
            return now - m.createdAt.toMillis() <= 86400000;
        });
        
        setChatMessages(validMsgs.reverse());
    });
    
    return () => { unsubSub(); unsubCli(); unsubChal(); unsubChat(); };
  }, []);

  useEffect(() => {
      if (isChatOpen && chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }
  }, [chatMessages, isChatOpen]);

  const handleSendMessage = async (e, photoData = null) => {
      if (e) e.preventDefault();
      const senderName = view === 'coach' ? "Coach" : formData.clientName;
      if (!newChatMessage.trim() && !photoData) return;
      try {
          await addDoc(collection(db, 'challenge_messages'), {
              text: newChatMessage.trim(),
              photoBase64: photoData || null,
              sender: senderName,
              createdAt: serverTimestamp()
          });
          setNewChatMessage('');
      } catch (err) {
          console.error("Fout bij verzenden chatbericht", err);
      }
  };

  const handleChatImageUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 600;
              let scaleSize = MAX_WIDTH / img.width;
              if (scaleSize > 1) scaleSize = 1;
              canvas.width = img.width * scaleSize;
              canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              handleSendMessage(null, canvas.toDataURL('image/jpeg', 0.6));
          };
          img.src = event.target.result;
      };
      reader.readAsDataURL(file);
  };

  const deleteChatMessage = async (id) => {
      if (window.confirm("Wil je dit bericht echt verwijderen?")) {
          await deleteDoc(doc(db, 'challenge_messages', id));
      }
  };

  const toggleFire = async (msgId, currentReactions) => {
      const currentUser = view === 'coach' ? "Coach" : formData.clientName;
      if (!currentUser) return;
      const newReactions = currentReactions.includes(currentUser)
          ? currentReactions.filter(u => u !== currentUser)
          : [...currentReactions, currentUser];
      try {
          await updateDoc(doc(db, 'challenge_messages', msgId), { fireReactions: newReactions });
      } catch (err) { 
          console.error("Fout bij reageren", err); 
      }
  };

  // NIEUW: Veilige inlog-logica met 3x fout = blokkade
  const handleClientLogin = (e) => {
    e.preventDefault();
    const safeName = loginName.trim().toLowerCase();
    const now = Date.now();
    const lockoutKey = 'fe_lockout_' + safeName;
    const attemptsKey = 'fe_attempts_' + safeName;

    // Check of de gebruiker momenteel is geblokkeerd
    const lockoutTime = localStorage.getItem(lockoutKey);
    if (lockoutTime && now < parseInt(lockoutTime)) {
        const minutesLeft = Math.ceil((parseInt(lockoutTime) - now) / 60000);
        setLoginError(`Veiligheidsblokkade. Probeer het over ${minutesLeft} minuten opnieuw.`);
        return;
    }

    const client = clients.find(c => 
      c.name.trim().toLowerCase() === safeName && 
      String(c.code).trim() === loginCode.trim()
    );
    
    if (client) {
      // Bij succes: reset alle veiligheids-counters
      localStorage.removeItem(lockoutKey);
      localStorage.removeItem(attemptsKey);
      
      setFormData(prev => ({ ...prev, clientName: client.name }));
      localStorage.setItem('fe_name', client.name);
      setView('client');
      setLoginError('');
    } else {
      // Bij fout: tel pogingen op
      let attempts = parseInt(localStorage.getItem(attemptsKey) || '0') + 1;
      if (attempts >= 3) {
          // 3x fout? 15 minuten (15 * 60 * 1000 ms) blokkade instellen
          localStorage.setItem(lockoutKey, (now + 15 * 60 * 1000).toString());
          localStorage.removeItem(attemptsKey);
          setLoginError('Te veel mislukte pogingen. Account 15 minuten geblokkeerd.');
      } else {
          localStorage.setItem(attemptsKey, attempts.toString());
          setLoginError(`Naam of code onjuist. Poging ${attempts}/3`);
      }
    }
  };

  const handleAddClient = async (e) => {
    e.preventDefault();
    if (!newClientName || !newClientCode) return;
    try {
      await addDoc(collection(db, 'clients'), {
        name: newClientName.trim(),
        code: newClientCode.trim(),
        schemaUrl: '',
        schemaUrl2: '',    
        weeklyChallenge: '',
        task1: '', task2: '', task3: '',
        task1Done: false, task2Done: false, task3Done: false,
        endDate: '',
        webshopUrl: '',
        extraToolsUrl: '', 
        isChallengeParticipant: false,
        personalGoal: '', 
        targetWeight: '',
        subGoal1: '',
        subGoal2: '',
        createdAt: serverTimestamp()
      });
      setNewClientName('');
      setNewClientCode('');
    } catch (err) { alert("Fout bij toevoegen klant"); }
  };

  const updateClientField = async (id, field, value) => {
    try {
        await updateDoc(doc(db, 'clients', id), { [field]: value });
    } catch (err) { console.error("Fout bij opslaan", err); }
  };

  const updateChallengeGlobal = async (field, value) => {
      try {
          await setDoc(doc(db, 'settings', 'challenge'), { ...challengeSettings, [field]: value }, { merge: true });
      } catch (err) { console.error(err); }
  };

  const deleteClient = async (id) => {
    if (window.confirm("Klant toegang intrekken?")) await deleteDoc(doc(db, 'clients', id));
  };

  const handleChange = useCallback((e) => {
    const { name, value, type, checked } = e.target;
    setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
  }, []);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 600;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * (MAX_WIDTH / img.width);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        setFormData(prev => ({ ...prev, photoBase64: canvas.toDataURL('image/jpeg', 0.6) }));
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleWinnerImageUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
              const canvas = document.createElement('canvas');
              const size = Math.min(img.width, img.height);
              canvas.width = 400;
              canvas.height = 400;
              const ctx = canvas.getContext('2d');
              const startX = (img.width - size) / 2;
              const startY = (img.height - size) / 2;
              ctx.drawImage(img, startX, startY, size, size, 0, 0, 400, 400);
              setNewWinner(prev => ({ ...prev, photoBase64: canvas.toDataURL('image/jpeg', 0.8) }));
          };
          img.src = event.target.result;
      };
      reader.readAsDataURL(file);
  };

  const addWinner = async (e) => {
      e.preventDefault();
      if (!newWinner.name || !newWinner.photoBase64) {
          alert("Vul een naam in en kies een foto!");
          return;
      }
      const updatedWinners = [...(challengeSettings.winners || []), { ...newWinner, id: Date.now().toString() }];
      await updateChallengeGlobal('winners', updatedWinners);
      setNewWinner({ name: '', year: new Date().getFullYear().toString(), type: 'New Year Challenge', photoBase64: '' }); 
  };

  const removeWinner = async (id) => {
      if (window.confirm("Wil je deze winnaar echt verwijderen?")) {
          const updatedWinners = (challengeSettings.winners || []).filter(w => w.id !== id);
          await updateChallengeGlobal('winners', updatedWinners);
      }
  };

  const handlePinSubmit = (e) => {
    e.preventDefault();
    if (pinInput === COACH_PIN) { setView('coach'); setShowPinModal(false); setPinInput(''); setPinError(false); }
    else { setPinError(true); setPinInput(''); }
  };

  const handleSubmit = async () => {
    setIsSubmitting(true);
    try {
      await addDoc(collection(db, 'checkins'), { ...formData, createdAt: serverTimestamp() });
      setStep('summary');
    } catch (err) { alert("Fout bij verzenden."); } finally { setIsSubmitting(false); }
  };

  const deleteSubmission = async (id) => {
    if (window.confirm("Zeker weten?")) await deleteDoc(doc(db, 'checkins', id));
  };

  const toggleCheck = (id) => {
    const newChecked = new Set(checkedIds);
    if (newChecked.has(id)) newChecked.delete(id);
    else newChecked.add(id);
    setCheckedIds(newChecked);
  };

  const getRpeLabel = (val) => {
    const labels = { "5": "5 - Gemiddeld", "6": "6 - Pittig", "7": "7 - Zwaar", "8": "8 - Zeer Zwaar", "9": "9 - Maximaal", "10": "10 - Tot Falen" };
    return labels[val] || val;
  };

  const filteredSubmissions = useMemo(() => {
    return submissions.filter(s => (s.clientName || "").toLowerCase().includes(searchTerm.toLowerCase()));
  }, [submissions, searchTerm]);

  const weeklyStats = useMemo(() => {
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

      return clients.map(client => {
          const clientSubs = submissions.filter(s =>
              s.clientName === client.name &&
              new Date(s.date) >= sevenDaysAgo
          );

          const checkinCount = clientSubs.length;
          let avgWeight = '-';
          let avgSteps = '-';
          let avgSleep = '-';
          let trainingCount = 0;

          if (checkinCount > 0) {
              const weights = clientSubs.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
              if (weights.length > 0) avgWeight = (weights.reduce((a, b) => a + b, 0) / weights.length).toFixed(1);

              const stepsList = clientSubs.map(s => parseInt(s.steps)).filter(s => !isNaN(s) && s > 0);
              if (stepsList.length > 0) avgSteps = Math.round(stepsList.reduce((a, b) => a + b, 0) / stepsList.length);

              const sleepList = clientSubs.map(s => parseFloat(s.sleepHours)).filter(s => !isNaN(s) && s > 0);
              if (sleepList.length > 0) avgSleep = (sleepList.reduce((a, b) => a + b, 0) / sleepList.length).toFixed(1);

              trainingCount = clientSubs.filter(s => s.trainingDay === true).length;
          }

          return { 
              id: client.id, 
              name: client.name, 
              checkinCount, 
              avgWeight, 
              avgSteps, 
              avgSleep, 
              trainingCount,
              targetWeight: client.targetWeight || ''
          };
      }).sort((a, b) => b.checkinCount - a.checkinCount); 
  }, [clients, submissions]);

  const communityStats = useMemo(() => {
      if (!challengeSettings.startDate) return { totalLost: 0, personalLost: 0, isFinished: false };

      const start = new Date(challengeSettings.startDate);
      const end = challengeSettings.endDate ? new Date(challengeSettings.endDate) : new Date('2099-01-01');
      end.setHours(23, 59, 59, 999); 

      const isFinished = challengeSettings.endDate ? new Date() > end : false;

      const participants = clients.filter(c => c.isChallengeParticipant).map(c => c.name);
      let totalLost = 0;
      let personalLost = 0; 

      participants.forEach(clientName => {
          const clientSubs = submissions.filter(s =>
              s.clientName === clientName &&
              new Date(s.date) >= start &&
              new Date(s.date) <= end &&
              s.weight
          ).sort((a, b) => new Date(a.date) - new Date(b.date)); 

          if (clientSubs.length > 1) {
              const firstWeight = parseFloat(clientSubs[0].weight);
              const lastWeight = parseFloat(clientSubs[clientSubs.length - 1].weight);
              
              if (!isNaN(firstWeight) && !isNaN(lastWeight) && firstWeight > lastWeight) {
                  const lost = firstWeight - lastWeight;
                  totalLost += lost;
                  
                  if (clientName === formData.clientName) {
                      personalLost = lost;
                  }
              }
          }
      });

      return { 
          totalLost: totalLost.toFixed(1), 
          personalLost: personalLost.toFixed(1), 
          isFinished 
      };
  }, [submissions, clients, challengeSettings.startDate, challengeSettings.endDate, formData.clientName]);

  const clientData = useMemo(() => {
    const data = submissions.filter(s => s.clientName === formData.clientName);
    const clientInfo = clients.find(c => c.name === formData.clientName);
    const lastWeight = data[0]?.weight || '0';
    const firstWeight = data[data.length - 1]?.weight || '0';
    const weightDiff = (Number(firstWeight) - Number(lastWeight)).toFixed(1);
    
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const streakCount = data.filter(s => new Date(s.date) >= sevenDaysAgo).length;

    const avgEnergy = data.length > 0 ? (data.reduce((acc, curr) => acc + Number(curr.energy), 0) / data.length).toFixed(1) : 0;
    const avgSleep = data.length > 0 ? (data.reduce((acc, curr) => acc + Number(curr.sleepHours), 0) / data.length).toFixed(1) : 0;
    const avgSteps = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.steps) || 0), 0) / data.length).toFixed(0) : 0;
    const avgWater = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.waterLiters) || 0), 0) / data.length).toFixed(1) : 0;
    const trainingsCount = data.filter(s => s.trainingDay === true).length;
    const avgProtein = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.proteinGrams) || 0), 0) / data.length).toFixed(0) : 0;

    let daysLeft = null;
    if (clientInfo?.endDate) {
        const end = new Date(clientInfo.endDate);
        const now = new Date();
        const diffTime = end - now;
        daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    const targetW = parseFloat(clientInfo?.targetWeight);
    const startW = parseFloat(firstWeight);
    const currW = parseFloat(lastWeight);
    let goalProgress = 0;

    if (!isNaN(targetW) && !isNaN(startW) && !isNaN(currW) && startW !== targetW) {
        if (startW > targetW) { 
            goalProgress = ((startW - currW) / (startW - targetW)) * 100;
        } else { 
            goalProgress = ((currW - startW) / (targetW - startW)) * 100;
        }
        goalProgress = Math.max(0, Math.min(100, Math.round(goalProgress)));
    }

    return {
        clientId: clientInfo?.id,
        isChallengeParticipant: clientInfo?.isChallengeParticipant || false,
        count: data.length,
        lastWeight,
        weightDiff: weightDiff > 0 ? `-${weightDiff}kg` : `${Math.abs(weightDiff)}kg`,
        avgEnergy, avgSleep, avgSteps,
        history: data.slice(0, 5),
        chartData: data.slice(0, 10),
        streak: streakCount,
        latestWin: data[0]?.biggestWin || '',

        schemaUrl2: clientInfo?.schemaUrl2 || '',
        weeklyChallenge: clientInfo?.weeklyChallenge || '',
        task1: clientInfo?.task1 || '', task2: clientInfo?.task2 || '', task3: clientInfo?.task3 || '',
        task1Done: clientInfo?.task1Done || false, task2Done: clientInfo?.task2Done || false, task3Done: clientInfo?.task3Done || false,
        endDate: clientInfo?.endDate || '',
        webshopUrl: clientInfo?.webshopUrl || '',
        extraToolsUrl: clientInfo?.extraToolsUrl || '',
        daysLeft,
        personalGoal: clientInfo?.personalGoal || '',
        targetWeight: clientInfo?.targetWeight || '',
        subGoal1: clientInfo?.subGoal1 || '',
        subGoal2: clientInfo?.subGoal2 || '',
        goalProgress,
        percWater: Math.min(100, Math.round((avgWater / 2.5) * 100)),
        percTraining: Math.min(100, Math.round((trainingsCount / 3) * 100)),
        percSleep: Math.min(100, Math.round((avgSleep / 7) * 100)),
        percProtein: Math.min(100, Math.round((avgProtein / 160) * 100)),
        percMovement: Math.min(100, Math.round((avgSteps / 10000) * 100))
    };
  }, [submissions, clients, formData.clientName]);

            <div className="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce"><CheckCircle2 size={48} /></div>
            <h2 className="text-4xl font-black italic uppercase mb-10">Ontvangen!</h2>
            <button onClick={() => { setStep('form'); setClientTab('dashboard'); }} style={{ backgroundColor: BRAND_RED }} className="px-12 py-5 text-white rounded-full font-black italic uppercase mx-auto flex items-center gap-3">
              <ChevronRight size={18}/> Naar Dashboard
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
