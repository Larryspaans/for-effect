const firebaseConfig = {

  projectId: "coaching-platform-77639",
  storageBucket: "coaching-platform-77639.appspot.com",

  appId: "1:231075823082:web:1f881fdb2164155b508693"
};

// --- UI COMPONENTS ---
const Card = ({ children, title, icon: Icon, className = "", subtitle, alert }) => (
  <div className={`bg-white rounded-[2rem] p-6 shadow-sm border transition-all ${alert ? 'border-red-500 bg-red-50/10' : 'border-gray-100'} mb-6 ${className}`}>
    {title && (
      <div className="flex justify-between items-start mb-6 border-b border-gray-50 pb-3">
        <div className="flex items-center gap-2">
          {Icon && <Icon size={18} style={{ color: alert ? '#ef4444' : BRAND_RED }} />}
          <div>
            <h2 className="text-sm font-black italic uppercase tracking-wider text-slate-800">
                {title} {alert && <span className="text-red-600 ml-2 animate-pulse font-black text-[10px]">⚠️ LET OP!</span>}
            </h2>
            {subtitle && <p className="text-[10px] text-slate-400 font-bold uppercase italic">{subtitle}</p>}
          </div>
        </div>
      </div>
    )}
    {children}
  </div>
);

const FormInput = ({ label, name, value, onChange, type = "text", placeholder, icon: Icon, ...props }) => (
  <div className="relative w-full mb-4">
    {label && <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1 ml-1">{label}</label>}
    <div className="relative">
        {Icon && <Icon size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />}
        <input 
            type={type} name={name} placeholder={placeholder} value={value} onChange={onChange} 
            className={`w-full bg-gray-50 border-none rounded-2xl py-4 pr-4 ${Icon ? 'pl-14' : 'pl-5'} text-sm font-bold outline-none focus:ring-2 focus:ring-red-500 transition-all text-slate-800 shadow-sm`}
            {...props}
        />
    </div>
  </div>
);

const SliderField = ({ label, name, value, onChange, max = "10", min = "1", step = "1", unit = "/10" }) => (
  <div className="mb-6 px-1">
    <div className="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-3 italic">
      <span>{label}</span>
      <span className="text-red-600 font-black">{value}{unit}</span>
    </div>
    <input type="range" name={name} min={min} max={max} step={step} value={value} onChange={onChange} className="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-[#E31E24]" />
  </div>
);

const ChallengeBar = ({ label, percentage }) => (
    <div className="mb-4">
        <div className="flex justify-between text-[9px] font-black uppercase italic mb-1">
            <span className="text-slate-500">{label}</span>
            <span className="text-red-600">{percentage}%</span>
        </div>
        <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div className="h-full bg-[#E31E24] transition-all duration-1000 ease-out" style={{ width: `${percentage}%` }}></div>
        </div>
    </div>
);

const WeightChart = ({ data }) => {
  if (!data || data.length < 2) return <div className="text-[10px] text-slate-400 italic text-center py-4 uppercase font-bold">Meer metingen nodig voor de grafiek</div>;
  const chartData = [...data].reverse(); 
  const weights = chartData.map(d => parseFloat(d.weight)).filter(w => !isNaN(w) && w > 0);
  if(weights.length < 2) return <div className="text-[10px] text-slate-400 italic text-center py-4 uppercase font-bold">Gewicht niet consistent ingevuld</div>;
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const range = maxW - minW;
  const pts = weights.map((w, i) => {
    const x = (i / (weights.length - 1)) * 100;
    const y = 100 - ((w - minW) / range) * 100;
    return `${x},${y}`;
  }).join(' ');
  return (
    <div className="mt-2 relative">
      <svg viewBox="0 -10 100 120" className="w-full h-32 overflow-visible" preserveAspectRatio="none">
        <polyline fill="none" stroke="#E31E24" strokeWidth="3" points={pts} strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-md" />
        {weights.map((w, i) => {
          const x = (i / (weights.length - 1)) * 100;
          const y = 100 - ((w - minW) / range) * 100;
          return <circle key={i} cx={x} cy={y} r="3.5" fill="white" stroke="#E31E24" strokeWidth="2" />;
        })}
      </svg>
    </div>
  );
};

// --- MAIN APP ---
const App = () => {
  const [view, setView] = useState('login'); 
  const [clientTab, setClientTab] = useState('dashboard');
  const [step, setStep] = useState('form');
  const [submissions, setSubmissions] = useState([]);
  const [clients, setClients] = useState([]);
  const [searchTerm, setSearchTerm] = useState('');
  const [isSubmitting, setIsSubmitting] = useState(false);
  const [showPinModal, setShowPinModal] = useState(false);
  const [showClientAdmin, setShowClientAdmin] = useState(false);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);
  const [checkedIds, setCheckedIds] = useState(new Set());
  
  const [loginName, setLoginName] = useState(localStorage.getItem('fe_name') || '');
  const [loginCode, setLoginCode] = useState('');
  const [loginError, setLoginError] = useState('');

  const [newClientName, setNewClientName] = useState('');
  const [newClientCode, setNewClientCode] = useState('');

  const [formData, setFormData] = useState({
    clientName: '',
    date: new Date().toISOString().split('T')[0],
    weight: '', sleepHours: 7, motivation: 5, energy: 5, mentalStress: 3,
    illnessSigns: '', musclePain: '', hunger: 3, cravings: '',
    bowelFrequency: 1, bowelQuality: 'Normaal', bloating: '',
    trainingDay: false, trainingDetails: '', steps: '', calories: '',
    trainingDuration: '', trainingRpe: '7',
    supplements: true, biggestWin: '', focusTomorrow: '', waterLiters: 2.5, 
    proteinGrams: '', cyclePhase: 'N.v.t.', photoBase64: '',
    screenTime: '', dailyRating: 7, gratefulFor: '', biggestChallenge: ''
  });

  useEffect(() => {
    signInAnonymously(auth).catch(console.error);
    const unsubSub = onSnapshot(collection(db, 'checkins'), (snapshot) => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      setSubmissions(data);
    });
    const unsubCli = onSnapshot(collection(db, 'clients'), (snapshot) => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      setClients(data);
    });
    return () => { unsubSub(); unsubCli(); };
  }, []);

  const handleClientLogin = (e) => {
    e.preventDefault();
    const client = clients.find(c => 
      c.name.trim().toLowerCase() === loginName.trim().toLowerCase() && 
      String(c.code).trim() === loginCode.trim()
    );
    
    if (client) {
      setFormData(prev => ({ ...prev, clientName: client.name }));
      localStorage.setItem('fe_name', client.name);
      setView('client');
      setLoginError('');
    } else {
      setLoginError('Naam of code niet gevonden');
    }
  };

  const handleAddClient = async (e) => {
    e.preventDefault();
    if (!newClientName || !newClientCode) return;
    try {
      await addDoc(collection(db, 'clients'), {
        name: newClientName.trim(),
        code: newClientCode.trim(),
        schemaUrl: '',
        schemaUrl2: '',    // NIEUW: 2e Schema link
        weeklyChallenge: '',
        task1: '', task2: '', task3: '',
        task1Done: false, task2Done: false, task3Done: false,
        endDate: '',
        webshopUrl: '',
        extraToolsUrl: '', // NIEUW: Extra tools link
        createdAt: serverTimestamp()
      });
      setNewClientName('');
      setNewClientCode('');
    } catch (err) { alert("Fout bij toevoegen klant"); }
  };

  const updateClientField = async (id, field, value) => {
    try {
        await updateDoc(doc(db, 'clients', id), { [field]: value });
    } catch (err) { console.error("Fout bij opslaan", err); }
  };

  const deleteClient = async (id) => {
    if (window.confirm("Klant toegang intrekken?")) await deleteDoc(doc(db, 'clients', id));
  };

  const handleChange = useCallback((e) => {
    const { name, value, type, checked } = e.target;
    setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
  }, []);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 600;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * (MAX_WIDTH / img.width);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        setFormData(prev => ({ ...prev, photoBase64: canvas.toDataURL('image/jpeg', 0.6) }));
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handlePinSubmit = (e) => {
    e.preventDefault();
    if (pinInput === COACH_PIN) { setView('coach'); setShowPinModal(false); setPinInput(''); setPinError(false); }
    else { setPinError(true); setPinInput(''); }
  };

  const handleSubmit = async () => {
    setIsSubmitting(true);
    try {
      await addDoc(collection(db, 'checkins'), { ...formData, createdAt: serverTimestamp() });
      setStep('summary');
    } catch (err) { alert("Fout bij verzenden."); } finally { setIsSubmitting(false); }
  };

  const deleteSubmission = async (id) => {
    if (window.confirm("Zeker weten?")) await deleteDoc(doc(db, 'checkins', id));
  };

  const toggleCheck = (id) => {
    const newChecked = new Set(checkedIds);
    if (newChecked.has(id)) newChecked.delete(id);
    else newChecked.add(id);
    setCheckedIds(newChecked);
  };

  const getRpeLabel = (val) => {
    const labels = { "5": "5 - Gemiddeld", "6": "6 - Pittig", "7": "7 - Zwaar", "8": "8 - Zeer Zwaar", "9": "9 - Maximaal", "10": "10 - Tot Falen" };
    return labels[val] || val;
  };

  const filteredSubmissions = useMemo(() => {
    return submissions.filter(s => (s.clientName || "").toLowerCase().includes(searchTerm.toLowerCase()));
  }, [submissions, searchTerm]);

  const clientData = useMemo(() => {
    const data = submissions.filter(s => s.clientName === formData.clientName);
    const clientInfo = clients.find(c => c.name === formData.clientName);
    const lastWeight = data[0]?.weight || '0';
    const firstWeight = data[data.length - 1]?.weight || '0';
    const weightDiff = (Number(firstWeight) - Number(lastWeight)).toFixed(1);
    
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const streakCount = data.filter(s => new Date(s.date) >= sevenDaysAgo).length;

    const avgEnergy = data.length > 0 ? (data.reduce((acc, curr) => acc + Number(curr.energy), 0) / data.length).toFixed(1) : 0;
    const avgSleep = data.length > 0 ? (data.reduce((acc, curr) => acc + Number(curr.sleepHours), 0) / data.length).toFixed(1) : 0;
    const avgSteps = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.steps) || 0), 0) / data.length).toFixed(0) : 0;
    const avgWater = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.waterLiters) || 0), 0) / data.length).toFixed(1) : 0;
    const trainingsCount = data.filter(s => s.trainingDay === true).length;
    const avgProtein = data.length > 0 ? (data.reduce((acc, curr) => acc + (Number(curr.proteinGrams) || 0), 0) / data.length).toFixed(0) : 0;

    let daysLeft = null;
    if (clientInfo?.endDate) {
        const end = new Date(clientInfo.endDate);
        const now = new Date();
        const diffTime = end - now;
        daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    return {
        clientId: clientInfo?.id,
        count: data.length,
        lastWeight,
        weightDiff: weightDiff > 0 ? `-${weightDiff}kg` : `${Math.abs(weightDiff)}kg`,
        avgEnergy, avgSleep, avgSteps,
        history: data.slice(0, 5),
        chartData: data.slice(0, 10),
        streak: streakCount,
        latestWin: data[0]?.biggestWin || '',
        schemaUrl: clientInfo?.schemaUrl || '',
        schemaUrl2: clientInfo?.schemaUrl2 || '',
        weeklyChallenge: clientInfo?.weeklyChallenge || '',
        task1: clientInfo?.task1 || '', task2: clientInfo?.task2 || '', task3: clientInfo?.task3 || '',
        task1Done: clientInfo?.task1Done || false, task2Done: clientInfo?.task2Done || false, task3Done: clientInfo?.task3Done || false,
        endDate: clientInfo?.endDate || '',
        webshopUrl: clientInfo?.webshopUrl || '',
        extraToolsUrl: clientInfo?.extraToolsUrl || '',
        daysLeft,
        percWater: Math.min(100, Math.round((avgWater / 2.5) * 100)),
        percTraining: Math.min(100, Math.round((trainingsCount / 3) * 100)),
        percSleep: Math.min(100, Math.round((avgSleep / 7) * 100)),
        percProtein: Math.min(100, Math.round((avgProtein / 160) * 100)),
        percMovement: Math.min(100, Math.round((avgSteps / 10000) * 100))
    };
  }, [submissions, clients, formData.clientName]);

  const toggleClientTask = async (taskIndex) => {
      const field = `task${taskIndex}Done`;
      const currentVal = clientData[field];
      await updateClientField(clientData.clientId, field, !currentVal);
  };

  if (view === 'login') {
    return (
        <div className="min-h-screen bg-[#FDFDFD] flex items-center justify-center p-4">
            <div className="w-full max-w-md">
                <div className="flex justify-center mb-8">
                    <div className="bg-[#E31E24] text-white px-6 py-2 font-black italic text-3xl skew-x-[-10deg] tracking-tighter uppercase">FOR-EFFECT</div>
                </div>
                <Card title="Client Inloggen" icon={Lock}>
                    <form onSubmit={handleClientLogin} className="space-y-4">
                        <FormInput icon={Users} placeholder="Je Naam" value={loginName} onChange={(e) => setLoginName(e.target.value)} />

                        <button type="submit" style={{backgroundColor: BRAND_RED}} className="w-full py-4 text-white rounded-2xl font-black italic uppercase shadow-lg active:scale-95 transition-all">Start Check-in</button>
                    </form>
                </Card>
                <div className="text-center">
                    <button onClick={() => setShowPinModal(true)} className="text-[10px] font-black text-slate-300 uppercase italic hover:text-slate-500">Coach Login</button>
                </div>
            </div>
            {showPinModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 backdrop-blur-sm p-4">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative">
                        <button onClick={() => setShowPinModal(false)} className="absolute right-6 top-6 text-slate-300"><X size={24}/></button>
                        <div className="flex flex-col items-center">
                            <Lock size={32} className="text-red-600 mb-4" />
                            <h3 className="text-xl font-black italic uppercase mb-8">Coach Dashboard</h3>
                            <form onSubmit={handlePinSubmit} className="w-full space-y-4">
                                <input type="password" placeholder="****" value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="w-full bg-slate-50 border-none rounded-2xl p-5 text-center text-2xl font-black tracking-[1em] outline-none" />
                                <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black italic uppercase">Inloggen</button>
                                {pinError && <p className="text-red-500 text-[10px] font-bold text-center uppercase">Onjuiste PIN</p>}
                            </form>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
  }

  if (view === 'coach') {
    return (
      <div className="min-h-screen bg-[#FDFDFD] p-4 md:p-8">
        <div className="max-w-6xl mx-auto">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <div className="bg-[#E31E24] text-white px-6 py-2 font-black italic text-2xl skew-x-[-10deg] uppercase tracking-tighter inline-block">FOR-EFFECT COACH</div>
                <div className="flex items-center gap-2 mt-2">
                    <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase italic">
                        {submissions.length - checkedIds.size} Nieuwe Check-ins
                    </span>
                </div>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
                <button onClick={() => setShowClientAdmin(!showClientAdmin)} className="px-4 py-2 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase italic flex items-center gap-2">
                    {showClientAdmin ? <ChevronRight size={14}/> : <UserPlus size={14}/>}
                    {showClientAdmin ? "Check-ins" : "Beheer Cliënten"}
                </button>
                <button onClick={() => setView('login')} className="px-4 py-2 bg-slate-800 text-white rounded-xl text-[10px] font-black uppercase italic">Uitloggen</button>
            </div>
          </div>
          
          {showClientAdmin ? (
            <div className="max-w-xl mx-auto animate-in fade-in zoom-in duration-300">
                <Card title="Nieuwe Klant Toevoegen" icon={UserPlus}>
                    <form onSubmit={handleAddClient} className="flex flex-col gap-4">
                        <FormInput placeholder="Naam Klant" value={newClientName} onChange={(e) => setNewClientName(e.target.value)} />
                        <FormInput placeholder="Kies Code (bijv 1234)" value={newClientCode} onChange={(e) => setNewClientCode(e.target.value)} />
                        <button type="submit" className="bg-slate-900 text-white py-4 rounded-2xl font-black uppercase italic text-xs">Toevoegen</button>
                    </form>
                </Card>
                <div className="space-y-3">
                    <h3 className="text-[10px] font-black uppercase text-slate-400 ml-2 italic">Huidige Klanten ({clients.length})</h3>
                    {clients.map(c => (
                        <div key={c.id} className="bg-white p-4 rounded-2xl flex flex-col gap-4 shadow-sm border border-slate-100">
                            <div className="flex justify-between items-center">
                                <div>
                                    <p className="font-black italic text-sm text-slate-800 uppercase tracking-tight">{c.name}</p>
                                    <p className="text-[10px] font-bold text-red-500 uppercase tracking-widest">Code: {c.code}</p>
                                </div>
                                <button onClick={() => deleteClient(c.id)} className="p-2 text-slate-300 hover:text-red-500"><Trash2 size={18}/></button>
                            </div>
                            <div className="grid grid-cols-1 gap-2">
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        defaultValue={c.schemaUrl} 
                                        placeholder="PDF Link (Schema 1)" 
                                        className="flex-1 bg-gray-50 border-none rounded-xl p-3 text-[10px] font-bold outline-none"
                                        onBlur={(e) => updateClientField(c.id, 'schemaUrl', e.target.value)}
                                    />
                                    <div className="bg-slate-100 p-3 rounded-xl text-slate-400"><FileText size={14}/></div>
                                </div>
                                {/* 2e SCHEMA LINK */}
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        defaultValue={c.schemaUrl2} 
                                        placeholder="PDF Link (Schema 2)" 
                                        className="flex-1 bg-gray-50 border-none rounded-xl p-3 text-[10px] font-bold outline-none"
                                        onBlur={(e) => updateClientField(c.id, 'schemaUrl2', e.target.value)}
                                    />
                                    <div className="bg-slate-100 p-3 rounded-xl text-slate-400"><FileText size={14}/></div>
                                </div>

                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        defaultValue={c.weeklyChallenge} 
                                        placeholder="Wekelijkse Challenge (Focus tekst)" 
                                        className="flex-1 bg-gray-50 border-none rounded-xl p-3 text-[10px] font-bold outline-none"
                                        onBlur={(e) => updateClientField(c.id, 'weeklyChallenge', e.target.value)}
                                    />
                                    <div className="bg-slate-100 p-3 rounded-xl text-blue-500"><Zap size={14}/></div>
                                </div>
                                <div className="grid grid-cols-1 gap-2 mt-2 border-t pt-2 border-slate-50">
                                    <p className="text-[9px] font-black uppercase italic text-slate-400">Opdrachten om af te vinken:</p>
                                    {[1, 2, 3].map(i => (

                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Zwaarte (RPE)</label>
                            <select name="trainingRpe" value={formData.trainingRpe} onChange={handleChange} className="bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none border-none shadow-sm h-[52px]">
                                <option value="5">5 - Gemiddeld</option><option value="6">6 - Pittig</option><option value="7">7 - Zwaar</option><option value="8">8 - Zeer Zwaar</option><option value="9">9 - Maximaal</option><option value="10">10 - Tot Falen</option>
                            </select>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <FormInput label="Stappen" type="number" name="steps" placeholder="0" value={formData.steps} onChange={handleChange} />
                        <FormInput label="Calorieën" type="number" name="calories" placeholder="0" value={formData.calories} onChange={handleChange} />
                    </div>
                    <textarea name="trainingDetails" placeholder="Details?" value={formData.trainingDetails} onChange={handleChange} className="w-full bg-gray-50 border-none rounded-2xl p-5 text-sm font-bold outline-none shadow-sm min-h-[80px]" />
                </Card>
                <Card title="Leefstijl & Mindset" icon={Brain}>
                    <FormInput icon={Smartphone} label="Schermtijd (u)" type="number" name="screenTime" placeholder="Bijv. 4" value={formData.screenTime} onChange={handleChange} />
                    <SliderField label="Cijfer voor je dag" name="dailyRating" value={formData.dailyRating} onChange={handleChange} />
                    <FormInput name="gratefulFor" placeholder="Dankbaar voor?" value={formData.gratefulFor} onChange={handleChange} />
                    <FormInput name="biggestChallenge" placeholder="Grootste uitdaging?" value={formData.biggestChallenge} onChange={handleChange} />
                </Card>
                <Card title="Reflectie & Foto" icon={Target}>
                    <FormInput icon={Trophy} name="biggestWin" placeholder="Grootste winst?" value={formData.biggestWin} onChange={handleChange} />
                    <label className="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl cursor-pointer mb-6 shadow-sm">
                        <input type="checkbox" name="supplements" checked={formData.supplements} onChange={handleChange} className="w-5 h-5 rounded text-red-600" />
                        <span className="font-black italic uppercase text-xs">Supplementen genomen</span>
                    </label>
                    <div className="bg-red-50 p-6 rounded-2xl border border-red-100 flex flex-col items-center justify-center relative overflow-hidden min-h-[100px]">
                        {formData.photoBase64 ? (
                            <div className="flex flex-col items-center gap-2">
                                <Check size={32} className="text-green-500" />
                                <span className="text-[10px] font-black uppercase italic text-green-700">Foto toegevoegd</span>
                                <button onClick={() => setFormData(prev => ({...prev, photoBase64: ''}))} className="text-[9px] text-red-500 underline">Verwijder</button>
                            </div>
                        ) : (
                            <>
                                <Camera size={24} className="text-red-600 mb-2" />
                                <span className="text-[10px] font-black uppercase italic text-red-600">Upload progressiefoto</span>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
                            </>
                        )}
                    </div>
                </Card>
                <div className="mt-8 pb-10">
                  <button onClick={handleSubmit} disabled={isSubmitting} style={{ backgroundColor: BRAND_RED }} className="w-full py-5 text-white rounded-3xl font-black italic uppercase shadow-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
                    <Activity size={18} /> {isSubmitting ? "Bezig..." : "Update Dashboard"}
                  </button>
                </div>
            </div>
          )
        ) : (
          <div className="py-24 text-center">
            <div className="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce"><CheckCircle2 size={48} /></div>
            <h2 className="text-4xl font-black italic uppercase mb-10">Ontvangen!</h2>
            <button onClick={() => { setStep('form'); setClientTab('dashboard'); }} style={{ backgroundColor: BRAND_RED }} className="px-12 py-5 text-white rounded-full font-black italic uppercase mx-auto flex items-center gap-3">
              <ChevronRight size={18}/> Naar Dashboard
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
